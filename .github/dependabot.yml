version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    # Batch this ecosystem into a single PR. Ungrouped, Dependabot
    # opens one PR per dependency, and each PR re-fires every
    # workflow in the repo.
    groups:
      github-actions:
        patterns:
          - "*"
