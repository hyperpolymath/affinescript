<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 900" font-family="ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="980" height="900" fill="#0e1322"/>
  <text x="40" y="48" fill="#e8ebf2" font-size="28" font-weight="700">Server-Authoritative Determinism</text>
  <text x="40" y="76" fill="#9aa6b8" font-size="16">one compiled <tspan fill="#f5d27a" font-weight="600">vm.wasm</tspan> runs on the client AND the authoritative server</text>

  <!-- PANEL A -->
  <text x="40" y="124" fill="#f5b945" font-size="18" font-weight="700">&#9312;  Same binary, both sides</text>

  <!-- client card -->
  <rect x="50" y="142" width="372" height="196" rx="14" fill="#15203a" stroke="#4f8cff" stroke-width="2"/>
  <text x="72" y="172" fill="#7fa9ff" font-size="16" font-weight="700">CLIENT &#8212; browser</text>
  <rect x="72" y="186" width="210" height="60" rx="10" fill="#3a2f12" stroke="#f5b945" stroke-width="2"/>
  <text x="92" y="212" fill="#f5d27a" font-size="16" font-weight="700">vm.wasm</text>
  <text x="92" y="232" fill="#cbb06a" font-size="12">predict locally (instant)</text>
  <text x="72" y="286" fill="#aab4c6" font-size="13">&#8594; Pixi render</text>
  <text x="72" y="310" fill="#aab4c6" font-size="13">rewind &#9664; replay on mismatch</text>

  <!-- server card -->
  <rect x="558" y="142" width="372" height="196" rx="14" fill="#14271f" stroke="#36c98d" stroke-width="2"/>
  <text x="580" y="172" fill="#5fe0aa" font-size="16" font-weight="700">SERVER &#8212; Elixir / OTP</text>
  <rect x="580" y="186" width="248" height="60" rx="10" fill="#3a2f12" stroke="#f5b945" stroke-width="2"/>
  <text x="600" y="212" fill="#f5d27a" font-size="16" font-weight="700">vm.wasm</text>
  <text x="600" y="232" fill="#cbb06a" font-size="12">authoritative step (via SNIFS / wasmex)</text>
  <text x="580" y="286" fill="#aab4c6" font-size="13">per-entity GenServer + supervision</text>
  <text x="580" y="310" fill="#aab4c6" font-size="13">orders all players' inputs</text>

  <!-- channel arrows in the gap -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#cdd3df"/></marker>
  </defs>
  <line x1="424" y1="196" x2="556" y2="196" stroke="#cdd3df" stroke-width="2" marker-end="url(#ah)"/>
  <text x="490" y="188" fill="#cbd3e2" font-size="12" text-anchor="middle">inputs</text>
  <line x1="556" y1="300" x2="424" y2="300" stroke="#cdd3df" stroke-width="2" marker-end="url(#ah)"/>
  <text x="490" y="316" fill="#cbd3e2" font-size="12" text-anchor="middle">state/hash</text>
  <text x="490" y="250" fill="#9aa6b8" font-size="12" text-anchor="middle">Phoenix</text>
  <text x="490" y="266" fill="#9aa6b8" font-size="12" text-anchor="middle">Channel</text>

  <!-- identical-module link -->
  <line x1="178" y1="246" x2="178" y2="360" stroke="#f5b945" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="700" y1="246" x2="700" y2="360" stroke="#f5b945" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="178" y1="360" x2="700" y2="360" stroke="#f5b945" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="439" y="382" fill="#f5b945" font-size="13" font-weight="600" text-anchor="middle">IDENTICAL compiled module &#8212; determinism for free</text>

  <!-- divider -->
  <line x1="40" y1="410" x2="940" y2="410" stroke="#222b42" stroke-width="1"/>

  <!-- PANEL B -->
  <text x="40" y="446" fill="#f5b945" font-size="18" font-weight="700">&#9313;  Predict &#8594; Confirm &#8594; Reconcile</text>

  <!-- rollback arc (above blocks) -->
  <path d="M770,476 C620,430 470,430 350,470" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahr)"/>
  <defs><marker id="ahr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#ff6b6b"/></marker></defs>
  <text x="560" y="438" fill="#ff8a8a" font-size="13" text-anchor="middle" font-weight="600">rewind to tick 10</text>

  <!-- tick blocks -->
  <!-- confirmed 8,9,10 -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <rect x="98"  y="496" width="44" height="40" rx="8" fill="#1c2e52" stroke="#4f8cff" stroke-width="2"/><text x="120" y="522" fill="#dbe6ff">8</text>
    <rect x="208" y="496" width="44" height="40" rx="8" fill="#1c2e52" stroke="#4f8cff" stroke-width="2"/><text x="230" y="522" fill="#dbe6ff">9</text>
    <rect x="318" y="496" width="44" height="40" rx="8" fill="#1c2e52" stroke="#4f8cff" stroke-width="2"/><text x="340" y="522" fill="#dbe6ff">10</text>
    <!-- predicted 11..14 -->
    <rect x="428" y="496" width="44" height="40" rx="8" fill="#15203a" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4"/><text x="450" y="522" fill="#9fb8ff">11</text>
    <rect x="538" y="496" width="44" height="40" rx="8" fill="#15203a" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4"/><text x="560" y="522" fill="#9fb8ff">12</text>
    <rect x="648" y="496" width="44" height="40" rx="8" fill="#15203a" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4"/><text x="670" y="522" fill="#9fb8ff">13</text>
    <rect x="758" y="496" width="44" height="40" rx="8" fill="#15203a" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4"/><text x="780" y="522" fill="#9fb8ff">14</text>
  </g>
  <text x="120" y="478" fill="#7fa9ff" font-size="11" text-anchor="middle">confirmed</text>
  <text x="605" y="478" fill="#9fb8ff" font-size="11" text-anchor="middle">predicted (my inputs only)</text>

  <!-- axis -->
  <line x1="80" y1="560" x2="900" y2="560" stroke="#33405f" stroke-width="2"/>
  <text x="908" y="564" fill="#9aa6b8" font-size="12">ticks</text>

  <!-- mismatch at 11 -->
  <text x="450" y="556" fill="#ff6b6b" font-size="14" text-anchor="middle" font-weight="700">&#10033; MISMATCH</text>
  <line x1="450" y1="536" x2="450" y2="596" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- server confirm marker -->
  <rect x="300" y="600" width="300" height="34" rx="8" fill="#14271f" stroke="#36c98d" stroke-width="1.5"/>
  <text x="450" y="622" fill="#5fe0aa" font-size="12.5" text-anchor="middle">server confirms 11 &#8212; incl. Player B's input</text>

  <!-- replay arrow (forward, below) -->
  <line x1="340" y1="660" x2="790" y2="660" stroke="#36c98d" stroke-width="2" marker-end="url(#ahg)"/>
  <defs><marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#36c98d"/></marker></defs>
  <text x="565" y="652" fill="#5fe0aa" font-size="12.5" text-anchor="middle">replay 11&#8230;14 with known inputs &#8594; corrected "now"</text>

  <!-- footnotes -->
  <text x="40" y="716" fill="#c7cedd" font-size="13">determinism  &#8658;  replay lands <tspan fill="#f5d27a">exactly</tspan> on the server's result (no drift)</text>
  <text x="40" y="742" fill="#c7cedd" font-size="13">reversible VM  &#8658;  rewind = run the instructions <tspan fill="#f5d27a">backward</tspan> (no stored snapshots)</text>
  <text x="40" y="768" fill="#c7cedd" font-size="13">affine types  &#8658;  no hidden aliasing to silently desync shared state</text>

  <text x="40" y="828" fill="#6f7c93" font-size="12">ReScript&#8594;JS can't: float/GC nondeterminism + no way to run the same artifact server-side.</text>
  <text x="40" y="848" fill="#6f7c93" font-size="12">Works with anything giving a deterministic, embeddable artifact both sides: AffineScript&#8594;wasm, Rust&#8594;wasm, &#8230;</text>
  <text x="40" y="876" fill="#55607a" font-size="11">hyperpolymath / idaptik &#183; AffineScript co-development 2026-06-04</text>
</svg>
